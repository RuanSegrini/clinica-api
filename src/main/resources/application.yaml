spring:
  application:
    name: clinica-api

  datasource:
    url: jdbc:postgresql://localhost:5432/clinicadb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

api:
  security:
    token:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080